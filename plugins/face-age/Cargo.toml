[workspace]

[package]
name = "face-age"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.57"
# Pure-Rust ONNX inference, run entirely in-sandbox. default-features off
# to drop the multithread/blas paths that don't exist on
# wasm32-unknown-unknown (no threads, no BLAS).
tract-onnx = { version = "0.21", default-features = false }
# Pure-Rust JPEG decoder with DCT-scaled decoding (1/8, 1/4, 1/2) so a
# 5-12 MP selfie frame is IDCT'd straight down to a small buffer — the
# preprocessing bottleneck for the cheap checks. default-features off
# drops the `rayon` multithreading that doesn't exist on wasm.
jpeg-decoder = { version = "0.3", default-features = false }

# getrandom (pulled transitively by tract for hashmap seeding) has no
# backend on wasm32-unknown-unknown; the `custom` feature + the no-op
# registration in lib.rs cover it. Scoped to wasm only so native builds
# (unit tests) use the OS backend.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["custom"] }

# For native unit tests of the decode/preprocess pipeline: encode a real
# JPEG to feed `estimate_age` (mirrors happy_path's fake_capture).
[dev-dependencies]
jpeg-encoder = "0.6"

[profile.release]
opt-level = "s"
lto = true
strip = true
