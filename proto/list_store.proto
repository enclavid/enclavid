syntax = "proto3";

package enclavid.list_store;

service ListStore {
  rpc Append(AppendRequest) returns (AppendResponse);
  rpc Get(GetRequest) returns (GetResponse);
}

message AppendRequest {
  string key = 1;
  bytes data = 2;
}

message AppendResponse {
  // List length after the append. Useful for observability — TEE can
  // compare to expected sequence numbers.
  uint64 length = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  repeated bytes items = 1;
}
