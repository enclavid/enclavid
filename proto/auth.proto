syntax = "proto3";

package enclavid.auth;

// Host-side RBAC + identity gate. The TEE never validates credentials
// itself — it forwards the client's Authorization header + the operation
// it wants to perform, and trusts the host's verdict.
//
// Trust model: equivalent to TEE-validates-with-host-fetched-JWKS. Host
// can lie about anything here, but K_client backstop in session creation
// (see architecture.md → Client-Facing Session Creation) bounds the
// damage to "fake PendingInit sessions", caught by rate-limit and audit
// log on the host side.
//
// Two-layer authorization:
//  1. Host (this RPC) — does this credential have permission for this
//     operation? Owns identity, JWT validation, mTLS-cert checks, RBAC.
//  2. TEE (after this RPC) — for operations on a specific session, does
//     the session's tenant_id match the credential's tenant_id?
//     Pure data-plane ownership check, no policy logic.
service Auth {
  rpc AuthorizeClient(AuthorizeClientRequest) returns (AuthorizeClientResponse);
}

// Operations the client API exposes. TEE always sets this; host decides
// whether the credential's permissions cover it. Adding an operation is a
// proto change visible to both sides — intentional, prevents typos that
// would result in either side silently misclassifying.
enum ClientOperation {
  CLIENT_OPERATION_UNSPECIFIED = 0;
  // POST /api/v1/sessions — create a new session in PendingInit.
  SESSION_CREATE = 1;
  // POST /api/v1/sessions/:id/init — deliver wrapped K_client, transition to Running.
  SESSION_INIT = 2;
  // GET /api/v1/sessions/:id — read session view (status, policy, ...).
  SESSION_READ = 3;
  // GET /api/v1/sessions/:id/disclosures — pull age-encrypted disclosure list.
  DATA_READ = 4;
}

message AuthorizeClientRequest {
  // Verbatim value of the HTTP Authorization header. TEE does not parse,
  // classify, or strip prefixes — host detects scheme (Bearer JWT, mTLS
  // cert thumbprint, etc.) and validates accordingly.
  string authorization_header = 1;

  // What the caller wants to do. UNSPECIFIED is rejected.
  ClientOperation operation = 2;
}

message AuthorizeClientResponse {
  // Tenant identity this credential is bound to — opaque string the TEE
  // uses for resource ownership: any session-specific operation must
  // additionally verify the session's tenant_id == this value (TEE-side
  // data-plane check). Host-side this is typically the Logto organization
  // id, but the TEE doesn't depend on that — any opaque per-credential
  // identifier suffices.
  string tenant_id = 1;
}
