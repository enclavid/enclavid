syntax = "proto3";

package enclavid.state;

// Session metadata, created by the TEE on POST /sessions and updated as
// the session progresses through the lifecycle (see architecture.md →
// Client-Facing Session Creation → State machine). Persisted via
// SessionStore gRPC as the METADATA field — opaque blob to host.
// Status lives separately as the STATUS field (plaintext, host-visible
// for TTL/cleanup).
message SessionMetadata {
  // Workspace (Logto organization) the session belongs to. Set at create
  // time from the auth verdict (host-side AuthorizeClient response);
  // never changes afterwards.
  string workspace_id = 1;

  // Policy reference resolved at create time. Tag → digest happens once,
  // here, atomically. The digest is then frozen for the session lifetime
  // and is what the TEE uses to pull from the registry at init time.
  string policy_name = 2;
  string policy_digest = 3;

  // Client's age secret-key (the policy-decryption key). Stored
  // encrypted under TEE_key as part of the metadata blob; never
  // host-visible. Used at /connect time to lazily pull and decrypt
  // the policy artifact for this session — deferred from /sessions
  // so creation stays cheap and abandoned sessions don't pay
  // compile-cost. Held in plaintext only inside TEE memory during
  // /sessions handler (validation) and during the first /connect
  // (decrypt + compile).
  bytes k_client = 4;

  // Reserved (was D_enc / D_plain — encrypted/plain policy layer
  // hashes, bound into per-session attestation in the pre-merge
  // architecture). With the merged /sessions endpoint, the policy
  // is not pulled or compiled until applicant /connect, so these
  // values aren't available at attestation-mint time. Restore as
  // a separate post-hoc audit endpoint if needed.
  reserved 5, 6;

  // Disclosure recipient pubkey: applicant-consented data is encrypted
  // to this in expose_data flows. Provided by the client at session
  // create time.
  string client_disclosure_pubkey = 7;

  // JSON claims for Match Mode (per-applicant input the policy
  // consumes). 1KB max enforced at TEE read.
  bytes input = 8;

  // Client-supplied opaque identifier for this verification. Optional.
  // NOT indexed by the TEE — clients keep their own
  // `external_ref → session_id` mapping. Proxied back in webhook
  // payloads and `GET /sessions/:id/status` responses for client-side
  // reconciliation. Length-bounded (≤128 ASCII graphic chars).
  string external_ref = 9;

  // Session lifecycle state, AEAD-bound to session_id by virtue of
  // living inside this metadata blob. The plaintext copy at
  // `BlobField::Status` exists purely as a host-side TTL/cleanup
  // hint; the TEE consults this field for any security or UX
  // decision so a lying host can't drive the wrong client reaction.
  SessionStatus status = 10;

  // Unix seconds at session create time. Used by /status to surface
  // age / latency to the client; does not feed any security
  // decision.
  uint64 created_at = 11;

  // Number of disclosure entries the engine has appended for this
  // session. Incremented by the persister atomically with each
  // SetState + AppendDisclosure write, so a /status read of
  // metadata never disagrees with the actual list length on the
  // host. Lets /status derive `has_shared_data` (or surface the
  // exact count) without paying the wire cost of pulling the full
  // disclosure list — entries can be tens of KB each.
  uint64 disclosure_count = 12;

  // Running hash chain over the disclosure-list ciphertexts. Updated
  // by the persister atomically with each AppendDisclosure write.
  //
  //   h_0 = SHA-256("enclavid-disclosure-chain" || session_id)
  //   h_{i+1} = SHA-256(h_i || ciphertext_{i+1})
  //
  // Lives inside the AEAD-sealed metadata blob (TEE_key + AAD =
  // session_id) — the host can neither read nor forge. /disclosures
  // recomputes the chain over the host-served list and rejects a
  // mismatch as a host-integrity violation, closing fabricate /
  // truncate / reorder / swap on the disclosure list. 32 bytes when
  // present, empty when no disclosures yet committed.
  bytes disclosure_hash = 13;
}

// Session lifecycle state. Single creation step (POST /sessions does
// the full setup atomically), no PendingInit / FailedInit pre-states.
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  // Session created and ready: K_client validated, metadata stored.
  // Multiple /connect + /input rounds from the applicant happen here.
  RUNNING = 2;
  // Policy returned a domain Status (Completed or Failed) — webhook
  // fired, shared data may be available for client pull.
  COMPLETED = 3;
  // Unrecoverable infrastructure error during the run.
  FAILED = 4;
  // Idle TTL elapsed without applicant interaction.
  EXPIRED = 6;
  // Reserved (was PENDING_INIT in pre-merge architecture).
  reserved 1;
  // Reserved (was FAILED_INIT in pre-merge architecture).
  reserved 5;
}

// Internal session state for policy replay.
// Encrypted with client key + TEE key before persistence.
message SessionState {
  bytes policy_hash = 1;
  repeated CallEvent events = 2;
}

// One record per host call. Position in `events` = call index (assigned
// monotonically as the policy executes). On replay, intercept walks events
// in order, verifies fn_name + args_hash match, and either returns the
// cached Completed result or re-runs the body for Suspended/unset status.
message CallEvent {
  string fn_name = 1;
  bytes args_hash = 2;
  oneof status {
    Completed completed = 3;
    Suspended suspended = 4;
  }
}

message Completed {
  bytes result = 1;
}

// Suspension request — typed by category with kind-specific params.
// UI renders based on which oneof variant is populated.
message Suspended {
  oneof request {
    DocumentRequest document = 1;
    BiometricRequest biometric = 2;
    ConsentRequest consent = 3;
    VerificationSetRequest verification_set = 4;
  }
}

message DocumentRequest {
  // Document kind + optional user-submitted data combined into one oneof.
  // Variant = what the policy asked for; `data` inside = user's answer.
  oneof kind {
    Passport passport = 1;
    IdCard id_card = 2;
    DriversLicense drivers_license = 3;
  }
}

message Passport {
  optional bytes image = 1;
}

message IdCard {
  optional TwoSidedImage images = 1;
}

message DriversLicense {
  optional TwoSidedImage images = 1;
}

message TwoSidedImage {
  bytes front = 1;
  bytes back = 2;
}

message BiometricRequest {
  oneof kind {
    Liveness liveness = 1;
  }
}

message Liveness {
  LivenessMode mode = 1;
  optional LivenessFrames frames = 2;
}

message LivenessFrames {
  repeated bytes frames = 1;
}

message ConsentRequest {
  repeated DisplayField fields = 1;
  // User's answer to the consent prompt.
  optional bool accepted = 2;
  // Purpose-of-use statement supplied by the policy. Shown on the
  // consent screen and persisted alongside the disclosure entry —
  // bound as part of the user's consent record for downstream audit.
  LocalizedText reason = 3;
}

// OR of alternatives (DNF). User satisfies exactly one alternative by
// providing all items in it. UI walks via progressive disclosure: at each
// step shows union of next items across still-viable alternatives.
message VerificationSetRequest {
  repeated CaptureGroup alternatives = 1;
  // User's submission: sequence of CaptureItems (from the chosen
  // alternative) with their data fields populated.
  optional VerificationSetData data = 2;
}

message VerificationSetData {
  repeated CaptureItem items = 1;
}

message CaptureGroup {
  repeated CaptureItem items = 1;
}

// Used both to describe a requested slot (data = None) and to carry a
// submitted value (data = Some). Same shape, different lifecycle phase.
message CaptureItem {
  oneof item {
    Passport passport = 1;
    IdCard id_card = 2;
    DriversLicense drivers_license = 3;
    Liveness liveness = 4;
  }
}

enum LivenessMode {
  LIVENESS_MODE_UNKNOWN = 0;
  SELFIE_VIDEO = 1;
}

// Field shown to user on consent screen. Sanitized before storage.
//
// `key` identifies what this field represents (typed enumeration with
// custom escape hatch — see `FieldKey`). `value` is the stringified
// data; format conventions are documented per-key in
// `wit/disclosure/disclosure.wit` and not enforced at the type level.
message DisplayField {
  FieldKey key = 1;
  string value = 2;
}

// Identifier for a `DisplayField`. Three shapes:
//   * `well_known` — one of the document-agnostic keys (name, DOB,
//     nationality, sex, residence, ...).
//   * `document_field` — a document-* key bundled with which document
//     it refers to (passport / id-card / DL), disambiguating same-key
//     disclosures from multiple documents.
//   * `custom` — escape hatch with localized free-form text.
//
// Mirrors `wit/disclosure/disclosure.wit:field-key` — keep in sync.
message FieldKey {
  oneof kind {
    WellKnownFieldKey well_known = 1;
    DocumentField document_field = 2;
    LocalizedText custom = 3;
  }
}

// Document-agnostic well-known keys. Document-* keys are intentionally
// absent — they live in `DocumentField` so the document role is part
// of the identifier.
enum WellKnownFieldKey {
  WELL_KNOWN_FIELD_KEY_UNSPECIFIED = 0;
  FIRST_NAME = 1;
  LAST_NAME = 2;
  MIDDLE_NAME = 3;
  DATE_OF_BIRTH = 4;
  PLACE_OF_BIRTH = 5;
  NATIONALITY = 6;
  SEX = 7;
  COUNTRY_OF_RESIDENCE = 8;
}

// A document-* well-known key. `role` says which physical document
// the field belongs to; `kind` says which field of that document.
// Together they're the equivalent of e.g. "passport-number" or
// "drivers-license-issue-date".
message DocumentField {
  DocumentRole role = 1;
  DocumentFieldKind kind = 2;
}

enum DocumentRole {
  DOCUMENT_ROLE_UNSPECIFIED = 0;
  PASSPORT = 1;
  ID_CARD = 2;
  DRIVERS_LICENSE = 3;
}

enum DocumentFieldKind {
  DOCUMENT_FIELD_KIND_UNSPECIFIED = 0;
  NUMBER = 1;
  ISSUING_COUNTRY = 2;
  ISSUE_DATE = 3;
  EXPIRY_DATE = 4;
}

// Localized free-form text used for `FieldKey.custom` and as the
// purpose-of-use statement in `ConsentRequest.reason`. `language` is
// a BCP-47 tag; `text` is the human-readable text in that language.
message LocalizedText {
  string language = 1;
  string text = 2;
}
