syntax = "proto3";

package enclavid.registry;

// Host-side proxy for OCI registry pulls. The TEE has no network stack
// (see Network Isolation in architecture.md); the host fetches by digest
// and forwards bytes over vsock.
//
// Trust model: host is NOT trusted on response content. The TEE
// recomputes the manifest digest and each layer digest against the
// request reference before trusting bytes — host can swap to any
// (manifest, layers) tuple whose digests match the requested
// reference, but cannot inject arbitrary content.
service Registry {
  // Pull an OCI artifact (manifest + all layers).
  //
  // The TEE passes the full pinned OCI ref + an opaque bearer payload;
  // the host parses the ref and authenticates to the named registry.
  // TEE doesn't care whether it's the Enclavid Angos or any other
  // OCI-compliant registry — same RPC either way.
  rpc Pull(PullRequest) returns (PullResponse);
}

message PullRequest {
  // Full pinned OCI reference: `<registry>/<repository>@sha256:<hex>`.
  // Host parses to construct the actual registry request; TEE only
  // produces it (extracting the digest substring for content-addressing
  // verification post-response). Tag-form is rejected upstream, so by
  // construction the host always receives a digest-pinned ref.
  string policy_ref = 1;
  // Opaque bearer payload the host attaches as `Authorization` when
  // calling the registry. Empty = anonymous pull (public registries).
  // TEE forwards verbatim from `SessionMetadata.registry_auth`; never
  // parses or inspects. See proto/state.proto and architecture.md →
  // Registry Decoupling.
  bytes registry_auth = 2;
}

message PullResponse {
  // The OCI manifest JSON as raw bytes.
  bytes manifest = 1;
  // Hex-encoded sha256 of `manifest` bytes — host must compute this and
  // the TEE re-verifies it matches the request reference's digest before
  // trusting the body. This is integrity, not authenticity: a lying host
  // can swap to ANY (manifest, layers) tuple where digest matches; what
  // it cannot do is alter content silently after we've started parsing.
  string manifest_digest = 2;
  // Layer payloads. Order matches `layers[]` array in the manifest JSON.
  // The TEE recomputes each layer digest before trusting bytes — same
  // integrity property as `manifest_digest`.
  repeated bytes layers = 3;
}
