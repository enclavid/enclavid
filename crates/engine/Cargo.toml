[package]
name = "enclavid-engine"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
enclavid-host-bridge = { path = "../host-bridge" }
enclavid-embedded = { path = "../embedded" }

# Used by `runner::decls::load_embedded` to pull the embedded custom
# sections (disclosure-fields, i18n) straight out of a compiled policy
# component without having to round-trip through wasmtime instantiation.
wasmparser = "0.247"

wasmtime = { version = "43", default-features = false, features = [
    "cranelift",
    "component-model",
    "runtime",
    "std",
    "async",
] }

# Runtime composition of policy + plugin components. Per-component Store
# isolation with channel-mediated cross-store calls. We use it instead of
# build-time wac compose to avoid combinatorial cache fragmentation and
# preserve our Arc<Component>-sharable plugin cache (see
# `[[project-section-level-encryption-plan]]` → "Shared plugin cache").
wasm-runtime-composer = { path = "../../../wasm-runtime-composer", default-features = false }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
blake3 = "1"
prost = "0.13"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
wit-component = "0.247"
# happy_path test reads the test-policy's source-side
# disclosure-fields.json / i18n.json via the same helpers the CLI uses
# at seal time; keeps the fixture's text-ref set in sync with what
# would land in the embedded sections of a sealed wasm.
enclavid-embedded = { path = "../embedded" }
